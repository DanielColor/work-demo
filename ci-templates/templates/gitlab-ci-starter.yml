# ============================================================
# GitLab CI 起始範本
#
# 使用方式：
#   1. 複製此檔案為專案根目錄的 .gitlab-ci.yml
#   2. 在 stages 區塊加入你需要的 stage 名稱
#   3. 在檔案下方填入對應的 job
#   4. 不需要的範例 job 直接刪除
#
# 前置條件（Group Variable，）：
#   - TELEGRAM_BOT_TOKEN  Telegram Bot Token
#   - TELEGRAM_CHAT_ID    接收通知的 Chat ID
#   - SSH_DEPLOY_KEY      CI_Deploy 私鑰（File 類型，部署用）
# ============================================================

stages:
  - notify_start
  # ↓ 在這裡加入你的 stages
  - test
  - build
  - deploy
  # ↑ 在這裡加入你的 stages
  - notify_end

include:
  - project: 'your-group/ci-template'
    file: '/jobs/secret-detection.yml'
  - project: 'your-group/ci-template'
    file: '/jobs/ssh-deploy.yml'
  - project: 'your-group/ci-template'
    file: '/jobs/notify-telegram.yml'

# ============================================================
# Telegram 通知（不需修改）
# ============================================================

notify-start:
  extends: .notify-telegram-start
  stage: notify_start
  tags:
    - docker

notify-end-success:
  extends: .notify-telegram-success
  stage: notify_end
  tags:
    - docker

notify-end-failure:
  extends: .notify-telegram-failure
  stage: notify_end
  tags:
    - docker

