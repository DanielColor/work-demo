---
.secret-detection:
  stage: test
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - |
      cat > /tmp/gitleaks.toml << 'TOML'
      [extend]
      useDefault = true

      # 機敏檔案：副檔名
      [[rules]]
      id = "sensitive-file-extensions"
      description = "Sensitive file by extension"
      path = '''(?i)\.(pem|key|p12|pfx|jks|keystore)$'''
      regex = '''.+'''

      # 機敏檔案：檔名
      [[rules]]
      id = "sensitive-file-names"
      description = "Sensitive file by name"
      path = '''(?i)(^|/)(\.env(\..+)?|credentials\.json|secrets\.(yaml|yml)|id_rsa|id_ed25519|\.netrc)$'''
      regex = '''.+'''

      # Python Django
      [[rules]]
      id = "django-secret-key"
      description = "Django SECRET_KEY"
      regex = '''SECRET_KEY\s*=\s*['"][^'"]{20,}['"]'''
      tags = ["python"]

      # React / Node .env 裡的 token
      [[rules]]
      id = "react-env-token"
      description = "React env token or key"
      regex = '''REACT_APP_[A-Z_]*(TOKEN|KEY|SECRET|PASSWORD)\s*=\s*\S+'''
      tags = ["react"]

      # Python database URL
      [[rules]]
      id = "python-database-url"
      description = "Python database connection URL with credentials"
      regex = '''(?i)(DATABASE_URL|DB_URL)\s*=\s*['"]?\w+://[^:]+:[^@]+@'''
      tags = ["python"]

      # Allowlist：.env.example 是範本檔，本來就該 commit
      [[allowlists]]
      description = "env.example files are templates, not real secrets"
      paths = ['''(^|/)\.env(\.example|\.sample|\.template)$''', '''(^|/)\.env\.example$''']

      # Allowlist：測試檔案中的假密碼與假 token
      [[allowlists]]
      description = "Test credentials and fake tokens in test files"
      paths = ['''(^|/)(tests?/.*\.(py|ts|js)|e2e/.*\.(ts|js)|spec/.*\.(py|ts|js)|.*\.(spec|test)\.(py|ts|js))$''']

      TOML
    - gitleaks detect --source . --config /tmp/gitleaks.toml --exit-code 1 --log-level warn --verbose 2>&1 | tee /tmp/gitleaks-report.txt; exit ${PIPESTATUS[0]}
  after_script:
    - |
      if [ -f /tmp/gitleaks-report.txt ] && grep -q "leaks found" /tmp/gitleaks-report.txt; then
        REPORT=$(grep -A 8 "^Finding:" /tmp/gitleaks-report.txt | head -50 | sed 's/\x1b\[[0-9;]*m//g')
        AUTHOR=$(echo "${CI_COMMIT_AUTHOR}" | sed 's/ <.*>//')
        MESSAGE=$(printf "🚨 機敏資訊偵測警告\n\n專案：%s\n分支：%s\nCommit：%s\n提交者：%s\n訊息：%s\nPipeline：%s\n\n%s" \
          "${CI_PROJECT_PATH}" "${CI_COMMIT_BRANCH}" "${CI_COMMIT_SHORT_SHA}" \
          "${AUTHOR}" "${CI_COMMIT_MESSAGE}" "${CI_PIPELINE_URL}" "${REPORT}")
        wget -q -O /dev/null \
          --post-data="chat_id=${TELEGRAM_CHAT_ID}&text=${MESSAGE}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
      fi
  tags:
    - docker
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  allow_failure: false

secret-detection:
  extends: .secret-detection
