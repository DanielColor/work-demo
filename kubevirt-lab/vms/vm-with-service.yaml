---
# VM 本體
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: web-vm
  namespace: default
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/vm: web-vm
        app: web-vm          # Service 用這個 label 找到 VM
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/kubevirt/fedora-cloud-container-disk-demo:latest
        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #cloud-config
              users:
                - name: fedora
                  password: fedora
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  lock_passwd: false
              runcmd:
                - dnf install -y nginx
                - systemctl enable --now nginx
---
# Service：讓外部能連到 VM 的 port 80
apiVersion: v1
kind: Service
metadata:
  name: web-vm-service
spec:
  selector:
    app: web-vm
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
