---
- name: Initialize new host
  hosts: all:!pve
  become: true
  vars:
    ansible_user: "{{ init_user | default('ubuntu') }}"
  roles:
    - role: common
      tags: common
    - role: timesync
      tags: timesync
    - role: ssh_keys
      tags: ssh_keys

- name: Confirm cleanup
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ask before removing default account keys
      pause:
        prompt: "Ansible_Deploy 已建立，是否清除所有機器的預設帳號 SSH key？[yes/no]"
      register: _confirm

    - name: Abort if not confirmed
      fail:
        msg: "使用者取消清除"
      when: _confirm.user_input | lower != 'yes'

- name: Cleanup default account keys
  hosts: all:!pve
  become: true
  roles:
    - role: ssh_keys
      tags: cleanup_default_keys
