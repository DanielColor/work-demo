# Netbox 安裝設定範本
# 複製此檔案為 env.yaml 並填入實際值
# 警告：請勿將填好的 env.yaml 提交至 git

port: 8000                           # Web UI 對外 port
install_dir: /opt/netbox-docker      # 安裝目錄

# 管理員
admin_user: admin
admin_pass: changeme                 # 請修改預設密碼
admin_email: admin@local
admin_token: changeme                # 請修改預設 API token
