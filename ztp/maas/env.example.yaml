# MAAS 安裝設定範本
# 複製此檔案為 env.yaml 並填入實際值
# 警告：請勿將填好的 env.yaml 提交至 git

# 安裝模式: region+rack | region | rack
mode: region+rack

# MAAS
maas_channel: 3.6/stable             # MAAS snap channel
maas_url: ""                         # 留空則自動從主要 IP 產生

# 資料庫 (region / region+rack only)
db_name: maasdb
db_user: maas
db_pass: changeme                    # 請修改預設密碼

# 管理員 (region / region+rack only)
admin_user: admin
admin_pass: changeme                 # 請修改預設密碼
admin_email: admin@local

# Rack only
region_url: ""                       # rack 模式必填
secret: ""                           # rack 模式必填
