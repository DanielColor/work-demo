services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      ai-network:
        ipv4_address: 172.20.0.10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      ai-network:
        ipv4_address: 172.20.0.11
    depends_on:
      - ollama

  redis:
    image: redis:alpine
    container_name: n8n-redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    networks:
      ai-network:
        ipv4_address: 172.20.0.20

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://192.168.1.x:5678
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=<CHANGE_ME>
      - N8N_SECURE_COOKIE=false
    networks:
      ai-network:
        ipv4_address: 172.20.0.21
    depends_on:
      - redis
      - ollama

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: n8n-worker
    restart: unless-stopped
    command: worker
    volumes:
      - ./n8n_worker_data:/home/node/.n8n
    environment:
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=<CHANGE_ME>
    networks:
      ai-network:
        ipv4_address: 172.20.0.22
    depends_on:
      - redis
      - n8n

volumes:
  ollama:
  open-webui:

networks:
  ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
