services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.2
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "18790:443"
    volumes:
      - ./nginx/openclaw.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - openclaw

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    user: root
    ports:
      - "18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OPENCLAW_DEFAULT_MODEL=ollama/qwen2.5:3b
      - OPENCLAW_CONTROL_UI_ALLOWED_ORIGINS=*
    depends_on:
      - ollama

volumes:
  ollama:
  open-webui:
  openclaw_data:
