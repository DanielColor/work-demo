[[servers]]
host = "192.168.1.x"
port = 389
use_ssl = false
start_tls = false
bind_dn = "cn=admin,dc=example,dc=com"
bind_password = "${LDAP_BIND_PASSWORD}"
search_base_dns = ["dc=example,dc=com"]
search_filter = "(|(uid=%s)(mail=%s))"

[servers.attributes]
login    = "uid"
email    = "mail"
name     = "cn"
surname  = "sn"

[[servers.group_mappings]]
group_dn = "cn=admins,ou=Groups,dc=example,dc=com"
org_role = "Admin"

[[servers.group_mappings]]
group_dn = "*"
org_role = "Viewer"
